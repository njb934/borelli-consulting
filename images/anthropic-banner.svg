<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161614;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A09;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4932A;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#D4932A;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#D4932A;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D4932A;stop-opacity:0" />
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(245,240,232,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#bg)"/>
  <rect width="600" height="220" fill="url(#grid)"/>

  <!-- Amber top border -->
  <rect width="600" height="2" fill="#D4932A"/>

  <!-- Subtle center glow -->
  <ellipse cx="300" cy="110" rx="240" ry="80" fill="rgba(212,147,42,0.05)"/>

  <!-- Decorative diamond marks -->
  <polygon points="42,110 50,102 58,110 50,118" fill="#D4932A" opacity="0.9"/>
  <polygon points="542,110 550,102 558,110 550,118" fill="#D4932A" opacity="0.9"/>

  <!-- Horizontal rule above text -->
  <line x1="80" y1="88" x2="520" y2="88" stroke="rgba(212,147,42,0.2)" stroke-width="1"/>

  <!-- ANTHROPIC wordmark -->
  <text x="300" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="400" letter-spacing="14" text-anchor="middle" fill="#F5F0E8">ANTHROPIC</text>

  <!-- Tagline -->
  <text x="300" y="154" font-family="'Courier New', monospace" font-size="10" letter-spacing="4" text-anchor="middle" fill="rgba(212,147,42,0.8)" text-transform="uppercase">AI SAFETY · CLAUDE · COWORK · DESIGN</text>

  <!-- Horizontal rule below text -->
  <line x1="80" y1="168" x2="520" y2="168" stroke="rgba(212,147,42,0.2)" stroke-width="1"/>

  <!-- Bottom amber line -->
  <rect y="218" width="600" height="2" fill="#D4932A" opacity="0.4"/>
</svg>
